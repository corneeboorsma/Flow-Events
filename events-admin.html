<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Admin — Flow Coffeebar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .fmt-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      background: var(--bg-soft);
      cursor: pointer;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      color: var(--text-mid);
    }
    .fmt-btn:hover { background: var(--border); color: var(--text); }

    #w-desc:empty:before {
      content: attr(data-placeholder);
      color: var(--text-light);
      pointer-events: none;
    }

    #w-desc ul, #w-desc ol { padding-left: 20px; }

    /* ─── WIZARD ─── */
    .wizard-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .wizard-overlay.open { opacity: 1; pointer-events: all; }

    .wizard {
      background: var(--white);
      border-radius: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 36px 32px 32px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.97);
      transition: transform 0.3s;
    }
    .wizard-overlay.open .wizard { transform: scale(1); }

    .wizard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .wizard-title { font-size: 1.5rem; font-style: italic; }

    .wizard-steps {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
    }

    .wizard-step-dot {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .wizard-step-dot.active { background: var(--primary); }
    .wizard-step-dot.done { background: var(--accent); }

    .wizard-step { display: none; }
    .wizard-step.visible { display: block; }

    .wizard-step-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }

    .theme-option {
      border: 3px solid transparent;
      border-radius: var(--radius-sm);
      padding: 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-soft);
      overflow: hidden;
      position: relative;
      aspect-ratio: 3/4;
    }
    .theme-option:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .theme-option.selected { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary); }

    .theme-option-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .theme-option:hover .theme-option-img { transform: scale(1.05); }

    .theme-option-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 6px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
    }

    .theme-option-emoji { font-size: 1.3rem; display: block; margin-bottom: 2px; }
    .theme-option-label { font-size: 0.7rem; font-weight: 700; color: #fff; letter-spacing: 0.05em; text-transform: uppercase; }

    .wizard-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      gap: 12px;
    }

    /* ─── EVENT LIST ─── */
    .event-row {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow 0.2s;
    }
    .event-row:hover { box-shadow: var(--shadow-sm); }

    .event-row-theme {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-row-info { flex: 1; min-width: 0; }
    .event-row-title { font-weight: 600; font-size: 0.95rem; }
    .event-row-meta { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; }

    .status-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .status-pill.draft { background: var(--bg-soft); color: var(--text-light); }
    .status-pill.published { background: #e8f5ec; color: var(--success); }

    /* ─── REGISTRATIONS TABLE ─── */
    .reg-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    .reg-table th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-light);
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .reg-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .reg-table tr:last-child td { border-bottom: none; }
    .reg-table tr:hover td { background: var(--bg-soft); }

    .reg-table .reg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      margin-right: 8px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .export-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    }
    .reg-row:last-child { border-bottom: none; }
    .reg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .reg-name { font-weight: 600; }
    .reg-email { color: var(--text-light); font-size: 0.8rem; }
    .reg-time { font-size: 0.75rem; color: var(--text-light); margin-left: auto; white-space: nowrap; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-logo">
      <div>
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
    </div>
    <div class="header-spacer" style="display:flex;justify-content:flex-end;align-items:center;gap:10px">
      <a href="events.html" class="btn btn-outline btn-sm" target="_blank">🌐 Publieke pagina</a>
      <a href="themes-admin.html" class="btn btn-outline btn-sm" target="_blank">🎨 Thema's</a>
    </div>
  </header>

  <div class="admin-layout">
    <nav class="admin-sidebar">
      <button class="admin-nav-item active" data-section="events">📅 Events</button>
      <button class="admin-nav-item" data-section="registrations">👥 Aanmeldingen</button>
      <button class="admin-nav-item" data-section="archive">🗄️ Archief</button>
    </nav>

    <main class="admin-content" id="admin-main"></main>
  </div>

  <!-- ─── EDIT REGISTRATION MODAL ─── -->
  <div class="wizard-overlay" id="edit-reg-overlay">
    <div class="wizard" style="max-width:440px">
      <div class="wizard-header">
        <h2 class="wizard-title">Aanmelding wijzigen</h2>
        <button class="modal-close" onclick="closeEditReg()">✕</button>
      </div>
      <div class="form-group">
        <label>Naam</label>
        <input type="text" id="er-name" placeholder="Naam">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="er-email" placeholder="E-mail">
      </div>
      <div class="form-group">
        <label>Telefoon</label>
        <input type="tel" id="er-phone" placeholder="Telefoonnummer">
      </div>
      <div class="form-group">
        <label>Straat en huisnummer</label>
        <input type="text" id="er-street" placeholder="bijv. Kerkstraat 12">
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px">
        <div class="form-group">
          <label>Postcode</label>
          <input type="text" id="er-zip" placeholder="bijv. 7461 AB">
        </div>
        <div class="form-group">
          <label>Woonplaats</label>
          <input type="text" id="er-city" placeholder="bijv. Rijssen">
        </div>
      </div>
      <div class="wizard-nav">
        <button class="btn btn-outline" onclick="closeEditReg()">Annuleren</button>
        <button class="btn btn-primary" id="er-save-btn" onclick="saveEditReg()">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- ─── WIZARD ─── -->
  <div class="wizard-overlay" id="wizard-overlay">
    <div class="wizard">
      <div class="wizard-header">
        <h2 class="wizard-title" id="wizard-title">Nieuw event</h2>
        <button class="modal-close" onclick="closeWizard()">✕</button>
      </div>

      <div class="wizard-steps" id="wizard-dots"></div>

      <!-- Step 1: Thema -->
      <div class="wizard-step" id="step-1">
        <div class="wizard-step-title">Stap 1 van 3 — Kies een thema</div>
        <div class="theme-grid" id="theme-grid"></div>
      </div>

      <!-- Step 2: Details -->
      <div class="wizard-step" id="step-2">
        <div class="wizard-step-title">Stap 2 van 3 — Event details</div>
        <div class="form-group">
          <label>Titel</label>
          <input type="text" id="w-title" placeholder="bijv. Snow Night bij Flow">
        </div>
        <div class="form-group">
          <label>Beschrijving</label>
          <div style="border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-soft)">
            <div style="display:flex;gap:2px;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap">
              <button type="button" class="fmt-btn" onclick="fmt('bold')" title="Vet"><b>B</b></button>
              <button type="button" class="fmt-btn" onclick="fmt('italic')" title="Cursief"><i>I</i></button>
              <button type="button" class="fmt-btn" onclick="fmt('underline')" title="Onderstrepen"><u>U</u></button>
              <div style="width:1px;background:var(--border);margin:2px 4px"></div>
              <button type="button" class="fmt-btn" onclick="fmt('insertUnorderedList')" title="Opsomming">☰</button>
              <button type="button" class="fmt-btn" onclick="fmt('insertOrderedList')" title="Genummerde lijst">1.</button>
            </div>
            <div id="w-desc" contenteditable="true" data-placeholder="Vertel iets over dit event..." style="min-height:80px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.92rem;color:var(--text);outline:none;line-height:1.6"></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap" id="ai-toolbar">
            <button type="button" class="btn btn-outline btn-sm" onclick="aiAssist('spelling')" id="ai-btn-spelling">✍️ Spellingcheck</button>
            <button type="button" class="btn btn-outline btn-sm" onclick="aiAssist('enthusiastic')" id="ai-btn-enthusiastic">🚀 Enthousiaster</button>
            <button type="button" class="btn btn-outline btn-sm" onclick="aiAssist('friendly')" id="ai-btn-friendly">🤝 Vriendelijker</button>
            <span id="ai-status" style="font-size:0.78rem;color:var(--text-light);align-self:center;display:none">Bezig...</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Datum</label>
            <input type="date" id="w-date">
          </div>
          <div class="form-group">
            <label>Tijdstip</label>
            <input type="time" id="w-time">
          </div>
        </div>
        <div class="form-group">
          <label>Duur <span style="font-weight:400;opacity:0.5">(optioneel)</span></label>
          <input type="text" id="w-duration" placeholder="bijv. 2 uur, 90 minuten">
        </div>
        <div class="form-group">
          <label>Locatie</label>
          <input type="text" id="w-location" placeholder="bijv. Flow Coffeebar, Enschede">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:0.88rem;font-weight:500">
            <input type="checkbox" id="w-paid" onchange="togglePriceField()" style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary)">
            Deelname is betaald
          </label>
        </div>
        <div class="form-group" id="w-price-group" style="display:none">
          <label>Prijs per persoon (€)</label>
          <input type="text" id="w-price" placeholder="bijv. 12,50" inputmode="decimal" style="width:100%">
          <div style="margin-top:10px">
            <label style="font-size:0.78rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:7px">Inclusief <span style="font-weight:400;opacity:0.5;text-transform:none">(optioneel)</span></label>
            <input type="text" id="w-includes" placeholder="bijv. koffie en consumptie">
          </div>
        </div>
      </div>

      <!-- Step 3: Capaciteit & publiceren -->
      <div class="wizard-step" id="step-3">
        <div class="wizard-step-title">Stap 3 van 3 — Capaciteit & publiceren</div>
        <div class="form-group">
          <label>Max. deelnemers (leeg = onbeperkt)</label>
          <input type="number" id="w-max" min="1" placeholder="bijv. 30">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="w-status">
            <option value="draft">Concept (niet zichtbaar)</option>
            <option value="published">Gepubliceerd (zichtbaar)</option>
          </select>
        </div>
        <div id="wizard-preview" style="margin-top:20px;padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-soft);font-size:0.85rem;line-height:1.7;color:var(--text-mid)"></div>
      </div>

      <div class="wizard-nav">
        <button class="btn btn-outline" id="wizard-back" type="button" onclick="wizardBack()">← Terug</button>
        <button class="btn btn-primary" id="wizard-next" type="button" onclick="wizardNext()">Volgende →</button>
      </div>
    </div>
  </div>

  <script src="events.js"></script>
  <script>
    let currentSection = 'events';
    let wizardStep = 1;
    const TOTAL_STEPS = 3;
    let selectedTheme = '';
    let editingEventId = null;

    // ─── NAV ───
    document.querySelectorAll('.admin-nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentSection = item.dataset.section;
        if (currentSection === 'events') renderEvents();
        if (currentSection === 'registrations') renderRegistrationsOverview();
        if (currentSection === 'archive') renderArchive();
      });
    });

    // ─── EVENTS LIST ───
    async function renderEvents() {
      const main = document.getElementById('admin-main');
      main.innerHTML = `<div class="admin-section-title">Events</div><p style="color:var(--text-light)">Laden...</p>`;

      const events = await getEvents();
      const active = events.filter(e => e.status !== 'archived').sort((a, b) => new Date(a.date) - new Date(b.date));

      // load registration counts for all events in parallel
      const regCounts = {};
      await Promise.all(active.map(async ev => {
        const regs = await getRegistrations(ev.id);
        regCounts[ev.id] = regs.length;
      }));

      main.innerHTML = `
        <div class="admin-section-title">Events</div>
        <div style="margin-bottom:20px">
          <button class="btn btn-primary" onclick="openWizard()">+ Nieuw event</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px" id="event-list">
          ${active.length === 0
            ? '<div class="empty-state"><span class="big-emoji">📅</span><p>Nog geen events aangemaakt.</p></div>'
            : active.map(ev => {
                const theme = THEMES[ev.theme] || THEMES.flow;
                const count = regCounts[ev.id] || 0;
                const max = ev.maxAttendees;
                const countLabel = max ? `${count} / ${max}` : `${count}`;
                const countColor = max && count >= max ? 'var(--danger)' : count > 0 ? 'var(--success)' : 'var(--text-light)';
                return `
                  <div style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--white);box-shadow:var(--shadow-sm)">
                    <div class="event-row" style="border:none;border-radius:0;box-shadow:none">
                      <div class="event-row-theme" style="background:${theme.accent}"></div>
                      <div class="event-row-info">
                        <div class="event-row-title">${ev.title}</div>
                        <div class="event-row-meta">${theme.emoji} ${theme.label} · ${formatDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}${ev.duration ? ' · ⏱ ' + ev.duration : ''}</div>
                      </div>
                      <span style="font-size:0.8rem;font-weight:700;color:${countColor};white-space:nowrap">👥 ${countLabel}</span>
                      <span class="status-pill ${ev.status}">${ev.status === 'published' ? 'Gepubliceerd' : 'Concept'}</span>
                      <button class="btn-icon" onclick="editEvent('${ev.id}')" title="Bewerken">✏️</button>
                      <button class="btn-icon" onclick="viewRegistrations('${ev.id}')" title="Aanmeldingen">👥</button>
                      <a class="btn-icon" href="event.html?id=${ev.id}" target="_blank" title="Bekijk eventpagina">🔗</a>
                      <button class="btn-icon" onclick="archiveEvent('${ev.id}')" title="Archiveren">🗄️</button>
                      <button class="btn-icon danger" onclick="removeEvent('${ev.id}')" title="Verwijderen">🗑️</button>
                      <button class="btn-icon" onclick="toggleRegPreview('${ev.id}')" title="Aanmeldingen tonen" id="toggle-btn-${ev.id}">▼</button>
                    </div>
                    <div id="reg-preview-${ev.id}" style="display:none;border-top:1px solid var(--border);padding:0 16px 14px;background:var(--bg-soft)"></div>
                  </div>`;
              }).join('')
          }
        </div>`;
    }

    async function removeEvent(id) {
      if (!confirm('Event verwijderen? Dit kan niet ongedaan worden gemaakt.')) return;
      await deleteEvent(id);
      renderEvents();
    }

    async function editEvent(id) {
      const ev = await getEvent(id);
      if (!ev) return;
      editingEventId = id;
      openWizard(ev);
    }

    // ─── WIZARD ───
    function openWizard(existing) {
      editingEventId = existing ? existing.id : null;
      wizardStep = 1;
      selectedTheme = existing ? existing.theme : '';

      document.getElementById('wizard-title').textContent = existing ? 'Event bewerken' : 'Nieuw event';

      if (existing) {
        document.getElementById('w-title').value = existing.title || '';
        document.getElementById('w-desc').innerHTML = existing.description || '';
        document.getElementById('w-date').value = existing.date || '';
        document.getElementById('w-time').value = existing.time || '';
        document.getElementById('w-duration').value = existing.duration || '';
        document.getElementById('w-location').value = existing.location || '';
        document.getElementById('w-paid').checked = !!existing.price;
        document.getElementById('w-price').value = existing.price || '';
        document.getElementById('w-includes').value = existing.includes || '';
        document.getElementById('w-price-group').style.display = existing.price ? 'block' : 'none';
        document.getElementById('w-max').value = existing.maxAttendees || '';
        document.getElementById('w-status').value = existing.status || 'draft';
      } else {
        document.getElementById('w-title').value = '';
        document.getElementById('w-desc').innerHTML = '';
        document.getElementById('w-date').value = '';
        document.getElementById('w-time').value = '';
        document.getElementById('w-duration').value = '';
        document.getElementById('w-location').value = 'Flow Coffeebar, Rijssen';
        document.getElementById('w-paid').checked = false;
        document.getElementById('w-price').value = '';
        document.getElementById('w-includes').value = '';
        document.getElementById('w-price-group').style.display = 'none';
      }

      renderThemeGrid();
      updateWizardStep();
      document.getElementById('wizard-overlay').classList.add('open');
    }

    function closeWizard() {
      document.getElementById('wizard-overlay').classList.remove('open');
    }

    function renderThemeGrid() {
      document.getElementById('theme-grid').innerHTML = Object.entries(THEMES).map(([key, t]) => `
        <div class="theme-option ${selectedTheme === key ? 'selected' : ''}" onclick="selectTheme('${key}')">
          <img class="theme-option-img" src="${t.img}" alt="${t.label}" loading="lazy">
          <div class="theme-option-overlay" style="background:linear-gradient(to top, ${t.accent}cc 0%, ${t.accent}33 50%, transparent 100%)">
            <span class="theme-option-emoji">${t.emoji}</span>
            <span class="theme-option-label">${t.label}</span>
          </div>
          ${selectedTheme === key ? `<div style="position:absolute;top:6px;right:6px;background:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--primary);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.2)">✓</div>` : ''}
        </div>
      `).join('');
    }

    function selectTheme(key) {
      selectedTheme = key;
      renderThemeGrid();
    }

    function updateWizardStep() {
      for (let i = 1; i <= TOTAL_STEPS; i++) {
        const el = document.getElementById(`step-${i}`);
        el.classList.toggle('visible', i === wizardStep);
      }

      const dots = document.getElementById('wizard-dots');
      dots.innerHTML = Array.from({ length: TOTAL_STEPS }, (_, i) => {
        const cls = i + 1 < wizardStep ? 'done' : i + 1 === wizardStep ? 'active' : '';
        return `<div class="wizard-step-dot ${cls}"></div>`;
      }).join('');

      document.getElementById('wizard-back').style.visibility = wizardStep === 1 ? 'hidden' : 'visible';

      const nextBtn = document.getElementById('wizard-next');
      nextBtn.disabled = false;
      if (wizardStep === TOTAL_STEPS) {
        nextBtn.textContent = editingEventId ? 'Opslaan ✓' : 'Aanmaken ✓';
      } else {
        nextBtn.textContent = 'Volgende →';
      }

      if (wizardStep === TOTAL_STEPS) updatePreview();
    }

    function updatePreview() {
      const theme = THEMES[selectedTheme] || THEMES.flow;
      const title = document.getElementById('w-title').value || '—';
      const date = document.getElementById('w-date').value;
      const time = document.getElementById('w-time').value;
      const duration = document.getElementById('w-duration').value;
      const location = document.getElementById('w-location').value;
      const max = document.getElementById('w-max').value;
      const price = document.getElementById('w-paid').checked ? document.getElementById('w-price').value.replace(',', '.') : null;
      const includes = document.getElementById('w-paid').checked ? document.getElementById('w-includes').value.trim() : null;

      document.getElementById('wizard-preview').innerHTML = `
        <strong>${theme.emoji} ${theme.label}</strong> — ${title}<br>
        ${date ? '📅 ' + formatDate(date) : ''} ${time ? '· 🕐 ' + time : ''} ${duration ? '· ⏱ ' + duration : ''}<br>
        ${location ? '📍 ' + location + '<br>' : ''}
        ${price ? '💶 € ' + parseFloat(price).toFixed(2) + ' p.p.' + (includes ? ' <span style="opacity:0.6">(incl. ' + includes + ')</span>' : '') + '<br>' : ''}
        ${max ? '👥 Max. ' + max + ' deelnemers' : '👥 Onbeperkt'}
      `;
    }

    function wizardBack() {
      if (wizardStep > 1) { wizardStep--; updateWizardStep(); }
    }

    async function wizardNext() {
      if (wizardStep === 1) {
        if (!selectedTheme) { alert('Kies een thema om verder te gaan.'); return; }
        wizardStep++;
        updateWizardStep();
        return;
      }

      if (wizardStep === 2) {
        const title = document.getElementById('w-title').value.trim();
        const date = document.getElementById('w-date').value;
        if (!title || !date) { alert('Vul minstens een titel en datum in.'); return; }
        wizardStep++;
        updateWizardStep();
        return;
      }

      if (wizardStep === TOTAL_STEPS) {
        await saveEvent();
      }
    }

    async function saveEvent() {
      const btn = document.getElementById('wizard-next');
      btn.disabled = true;
      btn.textContent = 'Bezig...';

      try {
        const maxVal = document.getElementById('w-max').value;
        const isPaid = document.getElementById('w-paid').checked;
        const priceRaw = isPaid ? document.getElementById('w-price').value.trim().replace(',', '.') : '';
        const includesVal = isPaid ? document.getElementById('w-includes').value.trim() : '';
        const data = {
          theme: selectedTheme,
          title: document.getElementById('w-title').value.trim(),
          description: document.getElementById('w-desc').innerHTML.trim(),
          date: document.getElementById('w-date').value,
          time: document.getElementById('w-time').value,
          duration: document.getElementById('w-duration').value.trim(),
          location: document.getElementById('w-location').value.trim(),
          price: priceRaw ? parseFloat(priceRaw) : null,
          includes: includesVal || null,
          maxAttendees: maxVal ? parseInt(maxVal) : null,
          status: document.getElementById('w-status').value,
        };

        if (editingEventId) {
          await updateEvent(editingEventId, data);
        } else {
          await createEvent(data);
        }

        closeWizard();
        renderEvents();
      } catch (err) {
        alert('Opslaan mislukt: ' + err.message);
        btn.disabled = false;
        btn.textContent = editingEventId ? 'Opslaan ✓' : 'Aanmaken ✓';
      }
    }

    async function toggleRegPreview(eventId) {
      const panel = document.getElementById(`reg-preview-${eventId}`);
      const btn = document.getElementById(`toggle-btn-${eventId}`);
      const isOpen = panel.style.display !== 'none';

      if (isOpen) {
        panel.style.display = 'none';
        btn.textContent = '▼';
        return;
      }

      btn.textContent = '▲';
      panel.style.display = 'block';
      panel.innerHTML = `<p style="font-size:0.82rem;color:var(--text-light);padding:12px 0">Laden...</p>`;

      const regs = await getRegistrations(eventId);
      if (regs.length === 0) {
        panel.innerHTML = `<p style="font-size:0.82rem;color:var(--text-light);padding:12px 0">Nog geen aanmeldingen.</p>`;
        return;
      }

      panel.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:6px;padding-top:12px">
          ${regs.map((r, i) => `
            <div style="display:flex;align-items:center;gap:10px;font-size:0.82rem;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="color:var(--text-light);width:20px;flex-shrink:0">${i + 1}</span>
              <span style="width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:0.72rem;flex-shrink:0">${r.name.charAt(0).toUpperCase()}</span>
              <span style="font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</span>
              <span style="color:var(--text-light);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.email}</span>
              <span style="color:var(--text-light);white-space:nowrap">${r.phone || '—'}</span>
            </div>`).join('')}
        </div>`;
    }

    // ─── REGISTRATIONS ───
    async function viewRegistrations(eventId) {
      document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
      document.querySelector('[data-section="registrations"]').classList.add('active');
      currentSection = 'registrations';
      await renderRegistrationsForEvent(eventId);
    }

    async function renderRegistrationsOverview() {
      const main = document.getElementById('admin-main');
      main.innerHTML = `<div class="admin-section-title">Aanmeldingen</div><p style="color:var(--text-light)">Laden...</p>`;

      const events = await getEvents();
      const published = events.filter(e => e.status === 'published').sort((a, b) => new Date(a.date) - new Date(b.date));

      if (published.length === 0) {
        main.innerHTML = `<div class="admin-section-title">Aanmeldingen</div>
          <div class="empty-state"><span class="big-emoji">👥</span><p>Geen gepubliceerde events.</p></div>`;
        return;
      }

      const regCounts = {};
      await Promise.all(published.map(async ev => {
        const regs = await getRegistrations(ev.id);
        regCounts[ev.id] = regs.length;
      }));

      main.innerHTML = `
        <div class="admin-section-title">Aanmeldingen</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${published.map(ev => {
            const theme = THEMES[ev.theme] || THEMES.flow;
            const count = regCounts[ev.id] || 0;
            const max = ev.maxAttendees;
            const countLabel = max ? `${count} / ${max}` : `${count}`;
            const countColor = max && count >= max ? 'var(--danger)' : count > 0 ? 'var(--success)' : 'var(--text-light)';
            return `
              <div class="event-row" style="cursor:pointer" onclick="renderRegistrationsForEvent('${ev.id}')">
                <div class="event-row-theme" style="background:${theme.accent}"></div>
                <div class="event-row-info">
                  <div class="event-row-title">${ev.title}</div>
                  <div class="event-row-meta">${theme.emoji} ${theme.label} · ${formatDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}</div>
                </div>
                <span style="font-size:0.8rem;font-weight:700;color:${countColor};white-space:nowrap">👥 ${countLabel}</span>
                <span style="font-size:0.82rem;color:var(--primary);font-weight:600">Bekijk →</span>
              </div>`;
          }).join('')}
        </div>`;
    }

    async function renderRegistrationsForEvent(eventId) {
      const main = document.getElementById('admin-main');
      main.innerHTML = `<p style="color:var(--text-light)">Laden...</p>`;

      const ev = await getEvent(eventId);
      const regs = await getRegistrations(eventId);
      const theme = THEMES[ev.theme] || THEMES.flow;

      const tableRows = regs.length === 0
        ? `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-light)">Nog geen aanmeldingen.</td></tr>`
        : regs.map((r, i) => `
            <tr>
              <td style="color:var(--text-light);font-size:0.78rem">${i + 1}</td>
              <td><span class="reg-avatar">${r.name.charAt(0).toUpperCase()}</span>${r.name}</td>
              <td>${r.email}</td>
              <td>${r.phone || '—'}</td>
              <td>${r.street || '—'}</td>
              <td>${r.zip || '—'}</td>
              <td>${r.city || '—'}</td>
              <td style="color:var(--text-light);font-size:0.78rem;white-space:nowrap">${new Date(r.registeredAt).toLocaleDateString('nl-BE', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
              <td style="white-space:nowrap">
                <button class="btn-icon" onclick="editRegistration('${eventId}','${r.id}')" title="Wijzigen">✏️</button>
                <button class="btn-icon danger" onclick="deleteRegistration('${eventId}','${r.id}')" title="Verwijderen">🗑️</button>
              </td>
            </tr>`).join('');

      main.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="renderRegistrationsOverview()">← Terug</button>
          <div class="admin-section-title" style="margin-bottom:0">
            <a href="event.html?id=${ev.id}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dashed var(--accent)" title="Bekijk eventpagina">${ev.title}</a>
          </div>
          <span class="status-pill published" style="background:${theme.accent}22;color:${theme.accent}">${theme.emoji} ${theme.label}</span>
        </div>
        <div style="font-size:0.9rem;color:var(--text-mid);margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap">
          <span>📅 ${formatDate(ev.date)}</span>
          ${ev.time ? `<span>🕐 ${ev.time}</span>` : ''}
          ${ev.duration ? `<span>⏱ ${ev.duration}</span>` : ''}
          ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
        </div>

        <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap">
          <div class="form-card" style="flex:1;min-width:120px;padding:16px 20px">
            <div style="font-size:0.8rem;color:var(--text-light)">Aangemeld</div>
            <div style="font-size:1.8rem;font-weight:700;color:var(--primary)">${regs.length}</div>
          </div>
          ${ev.maxAttendees ? `
          <div class="form-card" style="flex:1;min-width:120px;padding:16px 20px">
            <div style="font-size:0.8rem;color:var(--text-light)">Vrij</div>
            <div style="font-size:1.8rem;font-weight:700;color:var(--success)">${Math.max(0, ev.maxAttendees - regs.length)}</div>
          </div>` : ''}
        </div>

        <div class="export-bar">
          <button class="btn btn-outline btn-sm" onclick="exportExcel('${eventId}')">⬇ Excel</button>
          <button class="btn btn-outline btn-sm" onclick="exportPdf('${eventId}')">⬇ PDF</button>
        </div>

        <div style="overflow-x:auto;background:var(--white);border:1px solid var(--border);border-radius:var(--radius)">
          <table class="reg-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Naam</th>
                <th>E-mail</th>
                <th>Telefoon</th>
                <th>Straat</th>
                <th>Postcode</th>
                <th>Woonplaats</th>
                <th>Aangemeld op</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;
    }

    async function exportExcel(eventId) {
      const ev = await getEvent(eventId);
      const regs = await getRegistrations(eventId);

      const header = ['#', 'Naam', 'E-mail', 'Telefoon', 'Straat', 'Postcode', 'Woonplaats', 'Aangemeld op'];
      const rows = regs.map((r, i) => [
        i + 1,
        r.name,
        r.email,
        r.phone || '',
        r.street || '',
        r.zip || '',
        r.city || '',
        new Date(r.registeredAt).toLocaleString('nl-BE'),
      ]);

      const csvContent = [header, ...rows]
        .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(';'))
        .join('\n');

      const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `aanmeldingen-${ev.title.replace(/\s+/g, '-').toLowerCase()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function exportPdf(eventId) {
      const ev = await getEvent(eventId);
      const regs = await getRegistrations(eventId);
      const theme = THEMES[ev.theme] || THEMES.flow;

      const rows = regs.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${r.name}</td>
          <td>${r.email}</td>
          <td>${r.phone || '—'}</td>
          <td>${r.street || '—'}</td>
          <td>${r.zip || '—'}</td>
          <td>${r.city || '—'}</td>
          <td>${new Date(r.registeredAt).toLocaleString('nl-BE')}</td>
        </tr>`).join('');

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>Aanmeldingen — ${ev.title}</title>
        <style>
          body { font-family: Arial, sans-serif; padding: 32px; color: #1a1a1a; }
          h1 { font-size: 1.4rem; margin-bottom: 4px; }
          .meta { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
          .pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:700; background:${theme.accent}22; color:${theme.accent}; margin-left:8px; }
          table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
          th { text-align:left; padding: 8px 10px; border-bottom: 2px solid #eee; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:#888; }
          td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; }
          tr:nth-child(even) td { background: #fafaf8; }
        </style>
      </head><body>
        <h1>${ev.title} <span class="pill">${theme.emoji} ${theme.label}</span></h1>
        <div class="meta">${formatDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}${ev.duration ? ' · ⏱ ' + ev.duration : ''} · ${regs.length} aanmeldingen</div>
        <table>
          <thead><tr><th>#</th><th>Naam</th><th>E-mail</th><th>Telefoon</th><th>Straat</th><th>Postcode</th><th>Woonplaats</th><th>Aangemeld op</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="8" style="color:#aaa;padding:20px">Geen aanmeldingen</td></tr>'}</tbody>
        </table>
      </body></html>`;

      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.onload = () => win.print();
    }

    async function deleteRegistration(eventId, regId) {
      if (!confirm('Aanmelding verwijderen?')) return;
      await fbDelete(`events/${eventId}/registrations/${regId}`);
      renderRegistrationsForEvent(eventId);
    }

    async function editRegistration(eventId, regId) {
      const regs = await getRegistrations(eventId);
      const r = regs.find(x => x.id === regId);
      if (!r) return;

      const overlay = document.getElementById('edit-reg-overlay');
      document.getElementById('er-name').value = r.name || '';
      document.getElementById('er-email').value = r.email || '';
      document.getElementById('er-phone').value = r.phone || '';
      document.getElementById('er-street').value = r.street || '';
      document.getElementById('er-zip').value = r.zip || '';
      document.getElementById('er-city').value = r.city || '';
      overlay.dataset.eventId = eventId;
      overlay.dataset.regId = regId;
      overlay.classList.add('open');
    }

    function closeEditReg() {
      document.getElementById('edit-reg-overlay').classList.remove('open');
    }

    async function saveEditReg() {
      const overlay = document.getElementById('edit-reg-overlay');
      const eventId = overlay.dataset.eventId;
      const regId = overlay.dataset.regId;
      const btn = document.getElementById('er-save-btn');

      btn.disabled = true;
      btn.textContent = 'Opslaan...';

      await fbPatch(`events/${eventId}/registrations/${regId}`, {
        name: document.getElementById('er-name').value.trim(),
        email: document.getElementById('er-email').value.trim(),
        phone: document.getElementById('er-phone').value.trim(),
        street: document.getElementById('er-street').value.trim(),
        zip: document.getElementById('er-zip').value.trim(),
        city: document.getElementById('er-city').value.trim(),
      });

      closeEditReg();
      btn.disabled = false;
      btn.textContent = 'Opslaan';
      renderRegistrationsForEvent(eventId);
    }

    async function archiveEvent(id) {
      if (!confirm('Dit event archiveren? Het wordt niet meer getoond in de events lijst.')) return;
      await updateEvent(id, { status: 'archived' });
      renderEvents();
    }

    async function renderArchive() {
      const main = document.getElementById('admin-main');
      main.innerHTML = `<div class="admin-section-title">Archief</div><p style="color:var(--text-light)">Laden...</p>`;

      const events = await getEvents();
      const archived = events
        .filter(e => e.status === 'archived')
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      if (archived.length === 0) {
        main.innerHTML = `
          <div class="admin-section-title">Archief</div>
          <div class="empty-state"><span class="big-emoji">🗄️</span><p>Geen gearchiveerde events.</p></div>`;
        return;
      }

      // Group by year → month
      const grouped = {};
      for (const ev of archived) {
        const d = new Date(ev.date);
        const year = d.getFullYear();
        const month = d.getMonth(); // 0-based
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = [];
        grouped[year][month].push(ev);
      }

      const monthNames = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

      const sectionsHtml = Object.keys(grouped)
        .sort((a, b) => b - a)
        .map(year => {
          const monthsHtml = Object.keys(grouped[year])
            .sort((a, b) => b - a)
            .map(month => {
              const evRows = grouped[year][month].map(ev => {
                const theme = THEMES[ev.theme] || THEMES.flow;
                return `
                  <div class="event-row">
                    <div class="event-row-theme" style="background:${theme.accent}"></div>
                    <div class="event-row-info">
                      <div class="event-row-title">${ev.title}</div>
                      <div class="event-row-meta">${theme.emoji} ${theme.label} · ${formatDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}${ev.duration ? ' · ⏱ ' + ev.duration : ''}</div>
                    </div>
                    <span class="status-pill draft">Gearchiveerd</span>
                    <button class="btn-icon" onclick="duplicateEvent('${ev.id}')" title="Dupliceren als nieuw event">📋</button>
                    <button class="btn-icon danger" onclick="removeEvent('${ev.id}')" title="Definitief verwijderen">🗑️</button>
                  </div>`;
              }).join('');
              return `
                <div style="margin-bottom:8px">
                  <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);padding:8px 4px 6px">${monthNames[month]}</div>
                  <div style="display:flex;flex-direction:column;gap:8px">${evRows}</div>
                </div>`;
            }).join('');
          return `
            <div style="margin-bottom:28px">
              <div style="font-size:1.1rem;font-weight:700;color:var(--text);padding:0 4px 10px;border-bottom:2px solid var(--border);margin-bottom:12px">${year}</div>
              ${monthsHtml}
            </div>`;
        }).join('');

      main.innerHTML = `
        <div class="admin-section-title">Archief</div>
        <div>${sectionsHtml}</div>`;
    }

    async function duplicateEvent(id) {
      const ev = await getEvent(id);
      if (!ev) return;
      const copy = {
        theme: ev.theme,
        title: ev.title,
        description: ev.description || '',
        date: '',
        time: ev.time || '',
        duration: ev.duration || '',
        location: ev.location || 'Flow Coffeebar, Rijssen',
        maxAttendees: ev.maxAttendees || null,
        status: 'draft',
      };
      editingEventId = null;
      selectedTheme = copy.theme;
      wizardStep = 1;
      document.getElementById('wizard-title').textContent = 'Event dupliceren';
      document.getElementById('w-title').value = copy.title;
      document.getElementById('w-desc').innerHTML = copy.description;
      document.getElementById('w-date').value = copy.date;
      document.getElementById('w-time').value = copy.time;
      document.getElementById('w-duration').value = copy.duration;
      document.getElementById('w-location').value = copy.location;
      document.getElementById('w-paid').checked = !!ev.price;
      document.getElementById('w-price').value = ev.price || '';
      document.getElementById('w-includes').value = ev.includes || '';
      document.getElementById('w-price-group').style.display = ev.price ? 'block' : 'none';
      document.getElementById('w-max').value = copy.maxAttendees || '';
      document.getElementById('w-status').value = 'draft';
      renderThemeGrid();
      updateWizardStep();
      document.getElementById('wizard-overlay').classList.add('open');
    }

    function fmt(cmd) {
      document.getElementById('w-desc').focus();
      document.execCommand(cmd, false, null);
    }

    function togglePriceField() {
      const paid = document.getElementById('w-paid').checked;
      document.getElementById('w-price-group').style.display = paid ? 'block' : 'none';
      if (!paid) {
        document.getElementById('w-price').value = '';
        document.getElementById('w-includes').value = '';
      }
    }

    // ─── AI ASSIST ───
    const AI_PROXY_URL = 'https://flow-events-ai.cornee-b.workers.dev';

    async function aiAssist(mode) {
      const editor = document.getElementById('w-desc');
      const text = editor.innerText.trim();
      if (!text) { alert('Vul eerst een beschrijving in.'); return; }

      const btns = ['spelling', 'enthusiastic', 'friendly'].map(m => document.getElementById(`ai-btn-${m}`));
      const status = document.getElementById('ai-status');

      btns.forEach(b => b.disabled = true);
      status.style.display = 'inline';

      try {
        const res = await fetch(AI_PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, mode }),
        });
        if (!res.ok) throw new Error(await res.text());
        const { result } = await res.json();
        editor.innerHTML = result.replace(/\n/g, '<br>');
      } catch (err) {
        alert('AI-fout: ' + err.message);
      } finally {
        btns.forEach(b => b.disabled = false);
        status.style.display = 'none';
      }
    }

    // ─── INIT ───
    loadThemes().then(() => renderEvents());
  </script>

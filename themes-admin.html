<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thema's Beheer — Flow Coffeebar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg-soft); }

    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-title { font-size: 1.6rem; font-style: italic; }

    .theme-editor {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .theme-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      gap: 12px;
    }
    .theme-editor-header:hover { background: var(--bg-soft); }

    .theme-editor-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .theme-swatch {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .theme-editor-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .theme-editor-emoji { font-size: 1.3rem; }

    .theme-modified-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: #fff8e1;
      color: #8a6e00;
      display: none;
    }
    .theme-modified-badge.visible { display: inline-block; }

    .theme-chevron {
      font-size: 0.9rem;
      color: var(--text-light);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .theme-editor.open .theme-chevron { transform: rotate(180deg); }

    .theme-editor-body {
      display: none;
      padding: 0 22px 24px;
      border-top: 1px solid var(--border);
    }
    .theme-editor.open .theme-editor-body { display: block; }

    .theme-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin-top: 20px;
    }

    .theme-field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    .theme-field-desc {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .theme-field input[type="text"],
    .theme-field input[type="url"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--bg-soft);
      outline: none;
      transition: border-color 0.2s;
    }
    .theme-field input:focus { border-color: var(--primary); background: var(--white); }

    .theme-field-color {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .theme-field-color input[type="color"] {
      width: 40px;
      height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
      cursor: pointer;
      background: var(--white);
      flex-shrink: 0;
    }

    .theme-field-color input[type="text"] {
      flex: 1;
    }

    .theme-preview-bar {
      margin-top: 20px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .theme-preview-hero {
      padding: 24px 20px 20px;
      text-align: center;
      position: relative;
    }

    .theme-preview-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.15;
    }

    .theme-preview-hero > *:not(img) { position: relative; z-index: 1; }

    .theme-preview-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .theme-preview-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
    }

    .theme-preview-card {
      padding: 16px 20px;
    }

    .theme-preview-btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      margin-top: 12px;
    }

    .theme-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .theme-fields { grid-template-columns: 1fr; }
      .page-wrap { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-logo">
      <div>
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
    </div>
    <div class="header-spacer" style="display:flex;justify-content:flex-end;align-items:center;gap:10px">
      <a href="events-admin.html" class="btn btn-outline btn-sm">← Admin</a>
    </div>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <h1 class="page-title">Thema's beheren</h1>
      <button class="btn btn-primary btn-sm" onclick="newTheme()">+ Nieuw thema</button>
    </div>
    <div id="themes-container">
      <p style="color:var(--text-light)">Laden...</p>
    </div>
  </div>

  <footer class="footer">Flow Coffeebar &nbsp;|&nbsp; Grotestraat 38 &nbsp;|&nbsp; 7461 KG &nbsp;|&nbsp; Rijssen</footer>

  <!-- ─── NIEUW/DUPLICEER MODAL ─── -->
  <div class="wizard-overlay" id="theme-modal">
    <div class="wizard" style="max-width:440px">
      <div class="wizard-header">
        <h2 class="wizard-title" id="theme-modal-title">Nieuw thema</h2>
        <button class="modal-close" onclick="closeThemeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Naam</label>
        <input type="text" id="tm-name" placeholder="bijv. Warm" style="width:100%">
      </div>
      <div class="form-group" id="tm-template-group">
        <label>Basis op thema</label>
        <select id="tm-template" style="width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.92rem;background:var(--bg-soft);outline:none">
        </select>
      </div>
      <div id="tm-error" style="display:none;font-size:0.83rem;color:var(--danger);margin-bottom:8px"></div>
      <div class="wizard-nav">
        <button class="btn btn-outline" type="button" onclick="closeThemeModal()">Annuleren</button>
        <button class="btn btn-primary" type="button" onclick="confirmThemeModal()">Aanmaken →</button>
      </div>
    </div>
  </div>

  <script src="events.js"></script>
  <script>
    const FIELDS = [
      { key: 'label',  label: 'Naam',         type: 'text',  desc: 'Weergavenaam van het thema' },
      { key: 'emoji',  label: 'Emoji',         type: 'text',  desc: 'Icoon van het thema' },
      { key: 'accent', label: 'Accentkleur',   type: 'color', desc: 'Hoofdkleur: knoppen, labels, balk' },
      { key: 'bg',     label: 'Achtergrond',   type: 'color', desc: 'Pagina-achtergrondkleur' },
      { key: 'text',   label: 'Tekstkleur',    type: 'color', desc: 'Kleur van de tekst op de pagina' },
      { key: 'card',   label: 'Kaartkleur',    type: 'color', desc: 'Achtergrond van formulierkaart' },
      { key: 'hero',   label: 'Hero gradient', type: 'text',  desc: 'CSS gradient voor de hero-sectie', full: true },
      { key: 'img',    label: 'Foto URL',       type: 'url',   desc: 'Unsplash of andere afbeeldings-URL', full: true },
    ];

    async function init() {
      await loadThemes();
      renderThemes();
    }

    function renderThemes() {
      const container = document.getElementById('themes-container');
      const allKeys = Object.keys(THEMES);
      container.innerHTML = allKeys.map(key => buildEditor(key)).join('');
    }

    function isCustom(key) {
      return !THEMES_DEFAULT[key];
    }

    function buildEditor(key) {
      const t = THEMES[key];
      const def = THEMES_DEFAULT[key];
      const custom = isCustom(key);
      const isModified = !custom && JSON.stringify(t) !== JSON.stringify(def);

      const fieldsHtml = FIELDS.map(f => {
        const val = (t[f.key] || '').toString();
        const isColor = f.type === 'color';
        const fullWidth = f.full ? 'grid-column: 1 / -1' : '';
        const safeKey = key.replace(/[^a-zA-Z0-9_-]/g, '_');

        const input = isColor
          ? `<div class="theme-field-color">
               <input type="color" value="${/^#[0-9a-f]{6}$/i.test(val) ? val : '#cccccc'}" oninput="syncColor('${safeKey}','${f.key}',this,'text')" onchange="updatePreview('${safeKey}')">
               <input type="text" value="${val.replace(/"/g, '&quot;')}" id="tf-${safeKey}-${f.key}" oninput="syncColor('${safeKey}','${f.key}',this,'color')" onchange="updatePreview('${safeKey}')">
             </div>`
          : `<input type="${f.type}" value="${val.replace(/"/g, '&quot;')}" id="tf-${safeKey}-${f.key}" oninput="updatePreview('${safeKey}')">`;

        return `
          <div class="theme-field" style="${fullWidth}">
            <label>${f.label}</label>
            <div class="theme-field-desc">${f.desc}</div>
            ${input}
          </div>`;
      }).join('');

      const safeKey = key.replace(/[^a-zA-Z0-9_-]/g, '_');

      return `
        <div class="theme-editor" id="editor-${safeKey}">
          <div class="theme-editor-header" onclick="toggleEditor('${safeKey}')">
            <div class="theme-editor-header-left">
              <div class="theme-swatch" id="swatch-${safeKey}" style="background:${t.accent}"></div>
              <span class="theme-editor-emoji">${t.emoji}</span>
              <span class="theme-editor-name">${t.label}</span>
              ${custom ? `<span class="theme-modified-badge visible" style="background:#e8f5ec;color:var(--success)">Aangepast</span>` : ''}
              ${isModified ? `<span class="theme-modified-badge visible" id="badge-${safeKey}">Aangepast</span>` : `<span class="theme-modified-badge" id="badge-${safeKey}">Aangepast</span>`}
            </div>
            <div style="display:flex;gap:6px;align-items:center" onclick="event.stopPropagation()">
              <button class="btn-icon" onclick="duplicateTheme('${key}')" title="Dupliceren">📋</button>
              ${custom ? `<button class="btn-icon danger" onclick="removeTheme('${key}')" title="Verwijderen">🗑️</button>` : ''}
              <span class="theme-chevron">▼</span>
            </div>
          </div>
          <div class="theme-editor-body">
            <div class="theme-fields">${fieldsHtml}</div>
            <div class="theme-preview-bar" id="preview-${safeKey}"></div>
            <div class="theme-actions">
              <button class="btn btn-primary btn-sm" onclick="saveThemeEditor('${key}','${safeKey}')">💾 Opslaan</button>
              ${!custom ? `<button class="btn btn-outline btn-sm" onclick="resetThemeEditor('${key}','${safeKey}')">↺ Terugzetten naar standaard</button>` : ''}
            </div>
          </div>
        </div>`;
    }

    function toggleEditor(safeKey) {
      const el = document.getElementById(`editor-${safeKey}`);
      const isOpen = el.classList.toggle('open');
      if (isOpen) updatePreview(safeKey);
    }

    function syncColor(safeKey, field, source, target) {
      const val = source.value;
      if (target === 'text') {
        document.getElementById(`tf-${safeKey}-${field}`).value = val;
      } else {
        const colorInput = source.closest('.theme-field-color').querySelector('input[type="color"]');
        if (colorInput && /^#[0-9a-f]{6}$/i.test(val)) colorInput.value = val;
      }
    }

    function getEditorValues(safeKey) {
      const t = {};
      FIELDS.forEach(f => {
        const el = document.getElementById(`tf-${safeKey}-${f.key}`);
        if (el) t[f.key] = el.value.trim();
      });
      return t;
    }

    function updatePreview(safeKey) {
      const t = getEditorValues(safeKey);
      const previewEl = document.getElementById(`preview-${safeKey}`);
      const swatchEl = document.getElementById(`swatch-${safeKey}`);
      if (swatchEl) swatchEl.style.background = t.accent;
      if (!previewEl) return;

      previewEl.innerHTML = `
        <div class="theme-preview-hero" style="background:${t.hero}">
          <img src="${t.img}" alt="" loading="lazy" onerror="this.style.display='none'">
          <div class="theme-preview-pill" style="background:${t.accent}">${t.emoji} ${t.label}</div>
          <div class="theme-preview-title" style="color:${t.text}">Voorbeeldtitel evenement</div>
        </div>
        <div class="theme-preview-card" style="background:${t.card}">
          <div style="font-size:0.85rem;color:${t.text};opacity:0.7;margin-bottom:8px">Korte beschrijving van het evenement staat hier.</div>
          <span class="theme-preview-btn" style="background:${t.accent}">Aanmelden →</span>
        </div>`;
    }

    async function saveThemeEditor(key, safeKey) {
      const data = getEditorValues(safeKey);
      if (isCustom(key)) data._custom = true;
      THEMES[key] = data;
      await saveTheme(key, data);

      const badge = document.getElementById(`badge-${safeKey}`);
      if (badge) badge.classList.add('visible');
      document.getElementById(`editor-${safeKey}`).querySelector('.theme-editor-emoji').textContent = data.emoji;
      document.getElementById(`editor-${safeKey}`).querySelector('.theme-editor-name').textContent = data.label;

      showToast(`${data.emoji} ${data.label} opgeslagen`);
    }

    async function resetThemeEditor(key, safeKey) {
      if (!confirm(`Thema "${THEMES_DEFAULT[key].label}" terugzetten naar standaard?`)) return;
      await resetTheme(key);
      THEMES[key] = { ...THEMES_DEFAULT[key] };

      const el = document.getElementById(`editor-${safeKey}`);
      el.outerHTML = buildEditor(key);
      document.getElementById(`editor-${safeKey}`).classList.add('open');
      updatePreview(safeKey);
      showToast(`↺ ${THEMES_DEFAULT[key].label} teruggezet`);
    }

    // ─── NIEUW/DUPLICEER MODAL ───
    let themeModalMode = 'new'; // 'new' or 'duplicate'
    let themeModalSourceKey = null;

    function openThemeModal(mode, sourceKey) {
      themeModalMode = mode;
      themeModalSourceKey = sourceKey || null;

      document.getElementById('theme-modal-title').textContent =
        mode === 'duplicate' ? `Dupliceer "${THEMES[sourceKey].label}"` : 'Nieuw thema';
      document.getElementById('tm-name').value =
        mode === 'duplicate' ? `${THEMES[sourceKey].label} (kopie)` : '';
      document.getElementById('tm-error').style.display = 'none';

      // vul template-dropdown — bij dupliceren is template verborgen (bron is al bekend)
      const templateGroup = document.getElementById('tm-template-group');
      const select = document.getElementById('tm-template');
      if (mode === 'duplicate') {
        templateGroup.style.display = 'none';
      } else {
        templateGroup.style.display = 'block';
        select.innerHTML = Object.keys(THEMES).map(k =>
          `<option value="${k}">${THEMES[k].emoji} ${THEMES[k].label}</option>`
        ).join('');
      }

      document.getElementById('theme-modal').classList.add('open');
      setTimeout(() => document.getElementById('tm-name').focus(), 100);
    }

    function closeThemeModal() {
      document.getElementById('theme-modal').classList.remove('open');
    }

    async function confirmThemeModal() {
      const nameEl = document.getElementById('tm-name');
      const errEl = document.getElementById('tm-error');
      const name = nameEl.value.trim();

      if (!name) {
        errEl.textContent = 'Vul een naam in.';
        errEl.style.display = 'block';
        return;
      }

      const key = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      if (!key) {
        errEl.textContent = 'Naam bevat geen geldige tekens.';
        errEl.style.display = 'block';
        return;
      }
      if (THEMES[key]) {
        errEl.textContent = `Thema "${key}" bestaat al. Kies een andere naam.`;
        errEl.style.display = 'block';
        return;
      }

      const sourceKey = themeModalMode === 'duplicate'
        ? themeModalSourceKey
        : document.getElementById('tm-template').value;

      const copy = { ...THEMES[sourceKey], label: name, _custom: true };
      THEMES[key] = copy;
      await saveTheme(key, copy);

      closeThemeModal();

      const container = document.getElementById('themes-container');
      container.insertAdjacentHTML('beforeend', buildEditor(key));
      const safeKey = key.replace(/[^a-zA-Z0-9_-]/g, '_');
      document.getElementById(`editor-${safeKey}`).classList.add('open');
      updatePreview(safeKey);
      document.getElementById(`editor-${safeKey}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast(`${copy.emoji} "${copy.label}" aangemaakt`);
    }

    function newTheme() {
      openThemeModal('new', null);
    }

    async function duplicateTheme(key) {
      openThemeModal('duplicate', key);
    }

    async function removeTheme(key) {
      const t = THEMES[key];
      if (!confirm(`Thema "${t.label}" definitief verwijderen?`)) return;
      await deleteTheme(key);
      delete THEMES[key];
      const safeKey = key.replace(/[^a-zA-Z0-9_-]/g, '_');
      document.getElementById(`editor-${safeKey}`)?.remove();
      showToast(`🗑️ "${t.label}" verwijderd`);
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:30px;font-size:0.85rem;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;transition:opacity 0.2s';
      document.body.appendChild(t);
      requestAnimationFrame(() => t.style.opacity = 1);
      setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 200); }, 2200);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fdf8f3">
  <title>Events — Flow Coffeebar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg-soft); }

    .events-hero {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 48px 24px 44px;
      text-align: center;
    }
    .events-hero .script { font-size: 3.5rem; color: var(--primary); line-height: 1; }
    .events-hero-title { font-size: 1.6rem; font-style: italic; color: var(--text); margin-top: 6px; font-family: 'Playfair Display', serif; }
    .events-hero-sub { font-size: 0.9rem; color: var(--text-light); margin-top: 10px; }

    .events-list {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .event-row-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s;
    }
    .event-row-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

    .event-row-img {
      width: 140px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .event-row-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .event-row-card:hover .event-row-img img { transform: scale(1.05); }

    .event-row-img-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.45;
    }

    .event-row-body {
      flex: 1;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .event-row-top { margin-bottom: 10px; }

    .event-row-theme-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .event-row-title {
      font-size: 1.2rem;
      font-style: italic;
      font-family: 'Playfair Display', serif;
      line-height: 1.3;
      margin-bottom: 6px;
      color: var(--text);
    }

    .event-row-desc {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-row-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .event-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .event-row-meta span { display: flex; align-items: center; gap: 4px; }

    .event-row-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .spots-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg-soft);
      color: var(--text-mid);
      white-space: nowrap;
    }
    .spots-badge.full { background: #fff0ee; color: var(--danger); }
    .spots-badge.low { background: #fff8e1; color: #8a6e00; }

    .event-row-price {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-mid);
      white-space: nowrap;
    }

    .event-row-cta {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    .no-events {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-light);
    }
    .no-events .big-emoji { font-size: 3rem; display: block; margin-bottom: 16px; }

    @media (max-width: 640px) {
      .events-hero { padding: 32px 16px 28px; }
      .events-hero .script { font-size: 2.6rem; }
      .events-hero-title { font-size: 1.2rem; }
      .events-list { padding: 20px 16px 60px; gap: 12px; }
      .event-row-img { width: 100px; }
      .event-row-body { padding: 14px 16px; }
      .event-row-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-logo">
      <div>
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
    </div>
    <div class="header-spacer"></div>
  </header>

  <div class="events-hero">
    <div class="script">events</div>
    <div class="events-hero-title">Kom samen. Beleef iets moois.</div>
    <div class="events-hero-sub">Ontdek onze aankomende evenementen bij Flow Coffeebar.</div>
  </div>

  <div class="events-list" id="events-list">
    <div class="no-events">
      <span class="big-emoji">☕</span>
      <p>Laden...</p>
    </div>
  </div>

  <script src="events.js"></script>
  <script>
    async function init() {
      await loadThemes();
      const list = document.getElementById('events-list');
      const events = await getEvents();
      const published = events
        .filter(e => e.status === 'published')
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      if (published.length === 0) {
        list.innerHTML = `
          <div class="no-events">
            <span class="big-emoji">☕</span>
            <p>Momenteel geen evenementen gepland.<br>Kom binnenkort terug!</p>
          </div>`;
        return;
      }

      const cards = await Promise.all(published.map(async ev => {
        const regs = await getRegistrations(ev.id);
        const theme = THEMES[ev.theme] || THEMES.flow;
        const left = ev.maxAttendees ? Math.max(0, ev.maxAttendees - regs.length) : null;
        const isFull = left === 0;

        let spotsBadge = '';
        if (left !== null) {
          const cls = isFull ? 'full' : left <= 5 ? 'low' : '';
          const label = isFull ? 'Volgeboekt' : `${left} plekken vrij`;
          spotsBadge = `<span class="spots-badge ${cls}">${label}</span>`;
        }

        const desc = (ev.description || '').replace(/<[^>]+>/g, ' ').trim();

        return `
          <a class="event-row-card" href="event.html?id=${ev.id}">
            <div class="event-row-img">
              <img src="${theme.img}" alt="${theme.label}" loading="lazy">
              <div class="event-row-img-overlay" style="background:${theme.accent}"></div>
            </div>
            <div class="event-row-body">
              <div class="event-row-top">
                <div class="event-row-theme-label" style="background:${theme.accent}22;color:${theme.accent}">
                  ${theme.emoji} ${theme.label}
                </div>
                <div class="event-row-title">${ev.title}</div>
                ${desc ? `<div class="event-row-desc">${desc}</div>` : ''}
              </div>
              <div class="event-row-bottom">
                <div class="event-row-meta">
                  <span>📅 ${formatDate(ev.date)}</span>
                  ${ev.time ? `<span>🕐 ${ev.time}</span>` : ''}
                  ${ev.duration ? `<span>⏱ ${ev.duration}</span>` : ''}
                  ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
                </div>
                <div class="event-row-right">
                  ${ev.price ? `<span class="event-row-price">€ ${parseFloat(ev.price).toFixed(2)}</span>` : ''}
                  ${spotsBadge}
                  <span class="event-row-cta">Meer info →</span>
                </div>
              </div>
            </div>
          </a>`;
      }));

      list.innerHTML = cards.join('');
    }

    init();
  </script>
  <footer class="footer">Flow Coffeebar &nbsp;|&nbsp; Grotestraat 38 &nbsp;|&nbsp; 7461 KG &nbsp;|&nbsp; Rijssen</footer>

</body>
</html>
